<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>DROP 01</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    .glow {
      width: 300px;
      height: 300px;
      background: radial-gradient(red, transparent);
      position: absolute;
      filter: blur(120px);
    }

    .shirt {
      width: 220px;
      animation: spin 6s linear infinite;
      z-index: 2;
    }

    @keyframes spin {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }

    #countdown {
      margin-top: 40px;
      font-size: 22px;
      letter-spacing: 3px;
    }
  </style>
</head>

<body>

<div class="glow"></div>

<img class="shirt" src="https://i.imgur.com/your-shirt.png">

<div id="countdown"></div>

<script>
  const targetDate = new Date("Apr 30, 2026 00:00:00").getTime();

  setInterval(() => {
    const now = new Date().getTime();
    const diff = targetDate - now;

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const m = Math.floor((diff / 1000 / 60) % 60);
    const s = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").innerHTML =
      `${d}d ${h}h ${m}m ${s}s`;
  }, 1000);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  // Cena
  const scene = new THREE.Scene();

  // Câmera
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 3;

  // Renderizador
  const renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Luz
  const light = new THREE.PointLight(0xff0000, 1);
  light.position.set(5,5,5);
  scene.add(light);

  // Geometria TEMPORÁRIA (substitui pela camisa depois)
  const geometry = new THREE.BoxGeometry();
  const material = new THREE.MeshStandardMaterial({ color: 0x000000 });
  const cube = new THREE.Mesh(geometry, material);
  scene.add(cube);

  // Rotação automática
  function animate() {
    requestAnimationFrame(animate);
    cube.rotation.y += 0.01;
    renderer.render(scene, camera);
  }

  animate();
</script>
  <script>
let isDragging = false;

document.addEventListener("mousedown", () => {
  isDragging = true;
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

document.addEventListener("mousemove", (event) => {
  if (isDragging) {
    cube.rotation.y += event.movementX * 0.01;
    cube.rotation.x += event.movementY * 0.01;
  }
});
</script>
</body>
</html>
