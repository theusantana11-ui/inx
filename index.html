<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>DROP 01</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    .glow {
      width: 300px;
      height: 300px;
      background: radial-gradient(red, transparent);
      position: absolute;
      filter: blur(120px);
    }

    .shirt {
      width: 220px;
      animation: spin 6s linear infinite;
      z-index: 2;
    }

    @keyframes spin {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }

    #countdown {
      margin-top: 40px;
      font-size: 22px;
      letter-spacing: 3px;
    }
  </style>
</head>

<body>

<div class="glow"></div>

<img class="shirt" src="https://i.imgur.com/your-shirt.png">

<div id="countdown"></div>

<script>
  const targetDate = new Date("Apr 30, 2026 00:00:00").getTime();

  setInterval(() => {
    const now = new Date().getTime();
    const diff = targetDate - now;

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const m = Math.floor((diff / 1000 / 60) % 60);
    const s = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").innerHTML =
      `${d}d ${h}h ${m}m ${s}s`;
  }, 1000);
</script>

</body>
</html>
